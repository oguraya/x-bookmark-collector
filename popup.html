<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #15202b;
      color: #e7e9ea;
      padding: 16px;
    }
    h1 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-bar {
      background: #1e2d3d;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      text-align: center;
    }
    .count {
      font-size: 28px;
      font-weight: 700;
      color: #1d9bf0;
    }
    .count-label {
      font-size: 12px;
      color: #8b98a5;
      margin-top: 2px;
    }
    .collecting-indicator {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 8px;
      font-size: 12px;
      color: #1d9bf0;
    }
    .collecting-indicator.active { display: flex; }
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid #1e2d3d;
      border-top-color: #1d9bf0;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .tag-summary {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
      justify-content: center;
    }
    .tag-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 12px;
      background: #273340;
      color: #8b98a5;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 12px;
    }
    button {
      padding: 10px 16px;
      border: none;
      border-radius: 9999px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: #1d9bf0; color: #fff; }
    .btn-stop { background: #f4212e; color: #fff; }
    .btn-secondary { background: #273340; color: #e7e9ea; }
    .btn-danger {
      background: transparent;
      color: #f4212e;
      border: 1px solid #67070f;
      font-size: 12px;
      padding: 8px;
    }
    .btn-row { display: flex; gap: 8px; }
    .btn-row button { flex: 1; }

    .warning {
      background: #2d1f00;
      border: 1px solid #5c4200;
      color: #ffd166;
      border-radius: 8px;
      padding: 10px;
      font-size: 12px;
      line-height: 1.5;
      text-align: center;
    }
    .complete-msg {
      background: #0d2b1a;
      border: 1px solid #1a5c32;
      color: #4ade80;
      border-radius: 8px;
      padding: 10px;
      font-size: 12px;
      text-align: center;
      margin-bottom: 12px;
      display: none;
    }
    .toast {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: #1d9bf0;
      color: #fff;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
      z-index: 10;
    }
    .toast.show {
      display: block;
      animation: fadeout 2s forwards;
    }
    @keyframes fadeout {
      0%, 70% { opacity: 1; }
      100% { opacity: 0; }
    }
    .preview {
      margin-top: 12px;
      max-height: 160px;
      overflow-y: auto;
      background: #1e2d3d;
      border-radius: 8px;
      padding: 8px;
      font-size: 11px;
    }
    .preview-item {
      padding: 4px 0;
      border-bottom: 1px solid #273340;
      word-break: break-all;
      color: #8b98a5;
    }
    .preview-item:last-child { border-bottom: none; }
    .preview-item .url { color: #1d9bf0; }
    .preview-item .tags { color: #ffd166; font-size: 10px; }
  </style>
</head>
<body>
  <h1><span>🔖</span> X Bookmark Collector</h1>

  <div id="notOnPage" class="warning" style="display:none;">
    ⚠️ <strong>x.com/i/bookmarks</strong> を開いてください
  </div>

  <div id="mainUI" style="display:none;">
    <div class="status-bar">
      <div class="count" id="count">0</div>
      <div class="count-label">収集済みポスト</div>
      <div class="collecting-indicator" id="indicator">
        <div class="spinner"></div>
        <span>スクロール収集中...</span>
      </div>
      <div class="tag-summary" id="tagSummary"></div>
    </div>

    <div class="complete-msg" id="completeMsg">
      ✅ 収集完了 — TSVファイルを自動ダウンロードしました
    </div>

    <div class="btn-group">
      <button id="btnStart" class="btn-primary">▶ 収集開始（自動スクロール）</button>
      <button id="btnStop" class="btn-stop" style="display:none;">■ 停止</button>

      <div class="btn-row">
        <button id="btnDownload" class="btn-secondary">📊 TSVダウンロード</button>
        <button id="btnClear" class="btn-danger">🗑 クリア</button>
      </div>
    </div>

    <div class="preview" id="preview"></div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="popup.js"></script>
</body>
</html>
